<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TutorChat — Spanish Practice</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════
       Screen 1 — Setup
  ════════════════════════════════════════════════ -->
  <div id="setupScreen" class="screen">
    <div class="setup-card">
      <div class="brand">
        <h1>TutorChat</h1>
        <p>Spanish Practice &middot; A1/A2 &middot; Productive Failure</p>
      </div>

      <div class="picker-section">
        <label class="picker-label" for="studentNameInput">Your name</label>
        <input id="studentNameInput" type="text" placeholder="Enter your name" />
      </div>

      <!-- Exercise type -->
      <div class="picker-section">
        <label class="picker-label">What would you like to practise?</label>
        <div class="picker-grid" id="taskPicker">
          <button class="picker-card selected" data-value="translation">
            <span class="picker-icon">🔤</span>
            <strong>Translation</strong>
            <small>English → Spanish</small>
          </button>
          <button class="picker-card" data-value="error_correction">
            <span class="picker-icon">✏️</span>
            <strong>Error Correction</strong>
            <small>Find the mistakes</small>
          </button>
          <button class="picker-card" data-value="conversation_completion">
            <span class="picker-icon">💬</span>
            <strong>Conversation</strong>
            <small>Complete the dialogue</small>
          </button>
        </div>
      </div>

      <!-- Level -->
      <div class="picker-section">
        <label class="picker-label">How confident are you in Spanish?</label>
        <div class="picker-grid" id="levelPicker">
          <button class="picker-card" data-value="1">
            <span class="picker-icon">🌱</span>
            <strong>Beginner</strong>
            <small>Just starting out</small>
          </button>
          <button class="picker-card selected" data-value="2">
            <span class="picker-icon">📗</span>
            <strong>Elementary</strong>
            <small>Know some basics</small>
          </button>
          <button class="picker-card" data-value="3">
            <span class="picker-icon">⭐</span>
            <strong>Pre-Intermediate</strong>
            <small>Comfortable with present tense</small>
          </button>
        </div>
      </div>

      <!-- Upload (optional, collapsed) -->
      <details class="upload-section">
        <summary>📎 Upload study materials <span class="optional-tag">optional</span></summary>
        <div class="upload-inner">
          <input type="file" id="materialFile" accept=".pdf,.txt,.docx" />
          <button id="uploadMaterialBtn" class="btn secondary small">Upload</button>
          <span id="uploadStatus" class="upload-status"></span>
        </div>
      </details>

      <button id="startLearningBtn" class="btn primary large">Start Learning →</button>
      <p id="setupError" class="setup-error"></p>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       Screen 2 — Learning
  ════════════════════════════════════════════════ -->
  <div id="learningScreen" class="screen hidden">
    <header class="learn-header">
      <div class="learn-brand">TutorChat</div>
      <div class="header-right">
        <button id="endSessionBtn" class="btn ghost small">End Session</button>
      </div>
    </header>

    <div class="learning-layout">
      <aside class="history-sidebar">
        <h3 id="historySidebarTitle">Your Sessions</h3>
        <div id="historyList" class="history-list"></div>
        <p id="historyEmpty" class="history-empty">No previous sessions yet.</p>
      </aside>

      <main class="learn-main">

      <!-- Exercise card -->
      <div class="exercise-card">
        <div class="exercise-label" id="exerciseLabel">Exercise</div>
        <div class="mode-switcher">
          <span class="mode-switcher-label">Switch mode</span>
          <div id="learningTaskSwitcher" class="mode-switcher-buttons">
            <button class="mode-switch-btn selected" data-value="translation">Translation</button>
            <button class="mode-switch-btn" data-value="error_correction">Error Correction</button>
            <button class="mode-switch-btn" data-value="conversation_completion">Conversation</button>
          </div>
          <button id="switchModeBtn" class="btn ghost small">Switch Mode</button>
        </div>
        <div class="exercise-label hidden" id="consolidationLabel">Consolidation</div>
        <p id="problemText" class="exercise-text">Loading your first exercise…</p>
        <div id="consolidationCard" class="hidden"></div>
        <div class="exercise-actions">
          <button id="nextProblemBtn" class="btn success hidden">Next Exercise →</button>
        </div>
      </div>

      <!-- Chat conversation -->
      <div id="conversationLog" class="chat-log"></div>

      <!-- Status / warning line -->
      <p id="attemptWarning" class="status-line"></p>

      <!-- Answer input -->
      <div class="input-row">
        <textarea id="attemptBox" placeholder="Type your answer…" rows="3"></textarea>
        <button id="submitAttempt" class="btn primary submit-btn">Submit</button>
      </div>

      </main>
    </div>
  </div>

  <div id="historyModal" class="modal-backdrop hidden">
    <div class="modal-card history-modal-card">
      <h2 id="historyModalTitle">Previous Conversation</h2>
      <div id="historyModalMeta" class="history-modal-meta"></div>
      <div id="historyConversationContent" class="history-conversation"></div>
      <div class="modal-actions">
        <button id="closeHistoryModalBtn" class="btn ghost">Close</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       Analytics Modal
  ════════════════════════════════════════════════ -->
  <div id="analyticsModal" class="modal-backdrop hidden">
    <div class="modal-card">
      <h2>Session Summary</h2>
      <div class="stats-grid">
        <div class="stat-item">
          <strong id="statExercises">0</strong>
          <span>Exercises</span>
        </div>
        <div class="stat-item">
          <strong id="statAttempts">0</strong>
          <span>Total Attempts</span>
        </div>
        <div class="stat-item">
          <strong id="statTime">0:00</strong>
          <span>Time Elapsed</span>
        </div>
      </div>
      <canvas id="analyticsChart" width="440" height="180"></canvas>
      <div class="modal-actions">
        <button id="newSessionBtn" class="btn primary">Start New Session</button>
        <button id="closeModalBtn" class="btn ghost">Close</button>
      </div>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
